<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Coding Quiz</title> <!-- Less "v1.10" branding -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-wrapper"> <!-- Swapped 'container' for 'wrapper' -->
        <!-- Just one simple progress bar -->
        <div class="bar-outer"><div id="p-bar" class="bar-inner"></div></div>
        
        <div id="quiz-screen">
            <!-- Simpler text instead of // node.01 -->
            <p id="q-counter">Question 1 of 5</p>
            <h2 id="q-title">Wait for it...</h2>
            
            <div id="options" class="grid"></div>
            <div id="hint" style="display:none;"></div> <!-- Inline style for quick hiding -->
            
            <button id="next-btn" class="main-btn" style="display: none;">Next</button>
        </div>

        <div id="result-screen" style="display: none;">
            <h2>Done!</h2>
            <p>Your Final Rank: <span id="rank-text">?</span></p>
            <button onclick="location.reload()" class="main-btn">Try Again</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
